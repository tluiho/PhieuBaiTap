<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trang Multimedia</title>
</head>

<body style="font-family: Arial; margin: 20px;">

<h1>Giới thiệu sản phẩm</h1>

<h2>Logo</h2>
<svg width="100" height="100">
    <rect width="100" height="100" fill="blue"></rect>
    <text x="50%" y="55%" text-anchor="middle" fill="white">Zoo</text>
</svg>

<hr>

<h2>Hình ảnh sản phẩm</h2>

<figure>
    <img src="https://taronga.org.au/sites/default/files/2023-02/TCSA_buy_tickets_1000x818_0.jpg"
         alt="Ảnh 1"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Ảnh 1</figcaption>
</figure>

<figure>
    <img src="https://milwaukeezoo.org/wp-content/uploads/BigCats_RedPanda_Erin.jpg"
         alt="Ảnh 2"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Ảnh 2</figcaption>
</figure>

<figure>
    <img src="https://manlyobserver.com.au/wp-content/uploads/2022/11/Lion_TarongaZoo_01.jpg"
         alt="Ảnh 3"
         loading="lazy"
         style="max-width:100%; height:auto;">
    <figcaption>Ảnh 3</figcaption>
</figure>

<hr>

<h2>Video YouTube</h2>
<iframe width="560" height="315"
    src="https://youtu.be/7lDkXJZvT_4?si=Pbpv0huGxp5jHbmg"
    title="Video"
    frameborder="0"
    allowfullscreen>
</iframe>

<hr>

<h2>Video sản phẩm</h2>
<video controls poster="https://youtu.be/S5wQK3_6UZU?si=VoN-KkttoIozSuHc" width="400">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt không hỗ trợ video
</video>

<hr>

<h2>Âm thanh</h2>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio
</audio>

</body>
</html>
